<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección HP - {{ sede }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { 
            --easd-blue: #003366; 
            --easd-bg: #a8a8a8;  
            --easd-orange: #ff5023; 
        }

        body { background-color: var(--easd-bg); font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER similar a los anteriores */
        .header-bar {
            background: white; padding: 15px 50px; border-bottom: 4px solid var(--easd-blue);
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo-img { max-height: 50px; width: auto; }
        .title-select { text-align: center; color: var(--easd-blue); }
        .title-select h1 { margin: 0; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; }

        .btn-volver {
            border: 2px solid #6c757d; color: #6c757d; padding: 8px 20px;
            border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-volver:hover { background: #6c757d; color: white; }

        /* GRID DE SELECCIÓN */
        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .grid-hp {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card-hp {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--easd-blue);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
        }

        .card-hp:hover {
            transform: translateY(-10px);
            border-color: var(--easd-orange);
            color: var(--easd-orange);
        }

        .card-hp i { font-size: 3.5rem; margin-bottom: 15px; }
        .card-hp span { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; line-height: 1.2; }
        .card-hp p { font-size: 0.85rem; color: #64748b; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <header class="header-bar">
        <div style="display: flex; gap: 15px;">
            <img src="{{ url_for('static', filename='img/easd-valencia-1.PNG') }}" class="logo-img">
            <img src="{{ url_for('static', filename='img/easd-valencia-2.PNG') }}" class="logo-img">
        </div>

        <div class="title-select">
            <h1>HP - {{ sede }}</h1>
            <p style="margin:0; font-weight: 700; color: #64748b;">SELECCIONA EL MODELO DE TORRE</p>
        </div>

        <a href="{{ url_for('ver_sede', nombre_sede=sede) }}" class="btn-volver">
            <i class="bi bi-arrow-left"></i> VOLVER
        </a>
    </header>

    <main class="main-content">
        <div class="grid-hp">
            <a href="{{ url_for('ver_sede', nombre_sede=sede, cat='HP', estado='Nuevos') }}" class="card-hp">
                <i class="bi bi-pc-display-horizontal"></i>
                <span>Equipos<br>Nuevos</span>
                <p>Última adquisición</p>
            </a>

            <a href="{{ url_for('ver_sede', nombre_sede=sede, cat='HP', estado='Torres Grandes Viejas') }}" class="card-hp">
                <i class="bi bi-pc"></i>
                <span>Torres<br>Grandes Viejas</span>
                <p>Formato Full Tower</p>
            </a>

            <a href="{{ url_for('ver_sede', nombre_sede=sede, cat='HP', estado='Torres Medianas Viejas') }}" class="card-hp">
                <i class="bi bi-pc"></i>
                <span>Torres<br>Medianas Viejas</span>
                <p>Formato Mid Tower</p>
            </a>

            <a href="{{ url_for('ver_sede', nombre_sede=sede, cat='HP', estado='Torres Pequeñas Nuevas') }}" class="card-hp">
                <i class="bi bi-pc"></i>
                <span>Torres<br>Pequeñas Nuevas</span>
                <p>Formato SFF / Mini</p>
            </a>

            <a href="{{ url_for('ver_sede', nombre_sede=sede, cat='HP', estado='HP Plata') }}" class="card-hp">
                <i class="bi bi-pc"></i>
                <span>HP<br>Plata</span>
                <p>Edición especial plata</p>
            </a>
        </div>
    </main>

</body>
</html>
